name: Build CTIT Runner Container

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-ctit-container.yaml
      - .github/workflows/containers/ctit-runner/**
  pull_request:
    paths:
      - .github/workflows/build-ctit-container.yaml
      - .github/workflows/containers/ctit-runner/**
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/clang-tidy-infra/ctit-runner

jobs:
  build:
    if: github.repository_owner == 'clang-tidy-infra'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Login to GHCR
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Tag Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .github/workflows/containers/ctit-runner/
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test image
        run: bash tests/test_container.sh "${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}"

      - name: Push image
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: docker push --all-tags ${{ env.IMAGE_NAME }}
