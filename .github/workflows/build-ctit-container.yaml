name: Build CTIT Runner Container

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-ctit-container.yaml
      - .github/workflows/containers/ctit-runner/**
  pull_request:
    paths:
      - .github/workflows/build-ctit-container.yaml
      - .github/workflows/containers/ctit-runner/**
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/clang-tidy-infra/ctit-runner

jobs:
  build:
    if: github.repository_owner == 'clang-tidy-infra'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Login to GHCR
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Tag Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .github/workflows/containers/ctit-runner/
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test image
        run: bash tests/test_container.sh "${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}"

      - name: Push image
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: docker push --all-tags ${{ env.IMAGE_NAME }}
