name: Integration Testing

on:
  workflow_dispatch:
    inputs:
      pr_link:
        description: 'PR URL (e.g. https://github.com/llvm/llvm-project/pull/12345)'
        required: true
      check_name:
        description: 'Clang-tidy check name'
        required: true
      extra_config:
        description: 'Check options (e.g. VariableCase: camelBack)'
        required: false
      skip_ai_analysis:
        description: 'Skip the AI false-positive analysis step'
        type: boolean
        default: false
  issues:
    types: labeled
  issue_comment:
    types: [created]

permissions: {}

jobs:
  determine-runner:
    if: >
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'issues'
          && (github.event.label.name == 'cpp' || github.event.label.name == 'c'))
      || (github.event_name == 'issue_comment'
          && github.event.issue.pull_request == null
          && contains(github.event.comment.body, '/redo')
          && (contains(github.event.issue.labels.*.name, 'cpp')
              || contains(github.event.issue.labels.*.name, 'c'))
          && (github.event.comment.author_association == 'OWNER'
              || github.event.comment.author_association == 'MEMBER'))
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      runner: ${{ steps.set-runner.outputs.use-runner }}
    steps:
      - name: Determine runner
        id: set-runner
        uses: mikehardy/runner-fallback-action@dc7732f9e532c451b2527b288ba8d58fd4b0a4ca # v1.1.0
        with:
          primary-runner: "self-hosted"
          fallback-runner: "ubuntu-latest"
          github-token: ${{ secrets.RUNNER_ACCESS_TOKEN }}

  run-analysis:
    needs: determine-runner
    runs-on: ${{ fromJson(needs.determine-runner.outputs.runner) }}
    container: 
      image: ghcr.io/clang-tidy-infra/ctit-runner:latest # zizmor: ignore[unpinned-images]
      options: --user root
    timeout-minutes: 360

    permissions:
      issues: write
      contents: write
      packages: read

    env:
      SCCACHE_GHA_ENABLED: "true"
      LLVM_SYMBOLIZER_PATH: ${{ github.workspace }}/llvm-project/build/bin/llvm-symbolizer

    steps:
      - name: Acknowledge trigger
        if: github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_ID: ${{ github.event.comment.id }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_ID: ${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "issue_comment" ]; then
            gh api repos/$REPO/issues/comments/$COMMENT_ID/reactions -f content="eyes"
          fi
          REPORT_COMMENT_ID=$(gh api repos/$REPO/issues/$ISSUE_NUMBER/comments \
            -f body="Run started: https://github.com/$REPO/actions/runs/$RUN_ID" \
            --jq '.id')
          echo "REPORT_COMMENT_ID=$REPORT_COMMENT_ID" >> "$GITHUB_ENV"

      - name: Checkout CTIT
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true
          fetch-depth: 1
          persist-credentials: false

      - name: Prepare LLVM submodule
        run: |
          git config --global --add safe.directory '*'
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C llvm-project checkout .
          git -C llvm-project clean -fdx

      - name: Restore test-projects cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: test_projects
          key: test-projects-${{ hashFiles('testers/projects.json') }}

      - name: Clone test projects
        run: ./ctit.py clone --work-dir test_projects

      - name: Extract analysis inputs from issue body
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            {
              echo "${{ github.event.inputs.pr_link }} ${{ github.event.inputs.check_name }}"
              echo "${{ github.event.inputs.extra_config }}"
            } | python3 parse_issue.py $GITHUB_ENV
          else
            echo "${{ github.event.issue.body }}" | python3 parse_issue.py $GITHUB_ENV
          fi

          echo "PR_LINK: $PR_LINK"
          echo "CHECK_NAME: $CHECK_NAME"
          echo "TIDY_CONFIG: $TIDY_CONFIG"

      - name: Apply LLVM PR patch
        run: bash apply_patch.sh
        env:
          GITHUB_PATCH_ID: ${{ env.PR_LINK }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Build patched clang-tidy
        run: bash build.sh

      - name: Configure test projects
        run: ./ctit.py configure

      - name: Run clang-tidy on test projects
        run: >
          ./ctit.py analyze
          --check-name "${{ env.CHECK_NAME }}"
          --clang-tidy-binary llvm-project/build/bin/clang-tidy
          --run-tidy-script llvm-project/clang-tools-extra/clang-tidy/tool/run-clang-tidy.py
          ${{ env.TIDY_CONFIG && format('--tidy-config "{0}"', env.TIDY_CONFIG) || '' }}

      - name: Generate warnings report
        run: |
          ./ctit.py report

      - name: Run clang-tidy on clang test cases
        run: >
          ./ctit.py clang-tests
          --check-name "${{ env.CHECK_NAME }}"
          --clang-tidy-binary llvm-project/build/bin/clang-tidy
          --llvm-dir llvm-project
          --jobs "$(nproc)"
          ${{ env.TIDY_CONFIG && format('--tidy-config "{0}"', env.TIDY_CONFIG) || '' }}

      - name: Append clang test crashes to issue.md
        if: github.event_name != 'workflow_dispatch'
        run: |
          if [ -f clang-tests.md ]; then
            {
              printf '\n<details>\n<summary><b>Clang Test Crashes</b> (click to expand)</summary>\n\n'
              cat clang-tests.md
              printf '\n</details>\n'
            } >> issue.md
          fi

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Analyze false positives with Cursor agent
        if: inputs.skip_ai_analysis != true
        continue-on-error: true
        timeout-minutes: 30
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          ./ctit.py report-template
          agent --trust -p "report.md is a pre-filled table with one row per \
          clang-tidy warning. Edit it in place: replace the TBD cells in the \
          Verdict and Rationale columns and update the Summary line. Do not \
          touch columns 1-2 and 5 and do not add or remove rows. Follow AGENTS.md." \
          --model auto

      - name: Upload logs and reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        id: artifact
        with:
          name: ctit-logs
          path: |
            logs/
            issue.md
            report.md
            clang-tests.md

      - name: Append AI analysis to issue.md
        if: github.event_name != 'workflow_dispatch'
        run: |
          if [ -f report.md ]; then
            {
              printf '\n<details>\n<summary><b>AI False-Positive Analysis</b> (click to expand)</summary>\n\n'
              cat report.md
              printf '\n</details>\n'
            } >> issue.md
          fi

      - name: Slim issue.md for comment
        if: github.event_name != 'workflow_dispatch'
        run: python3 slim_comment.py issue.md "${{ steps.artifact.outputs.artifact-url }}"

      - name: Comment results on issue
        if: github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 -c "import json; print(json.dumps({'body': open('issue.md').read()}))" | \
            gh api --method PATCH repos/$REPO/issues/comments/$REPORT_COMMENT_ID --input -

      - name: Update comment on job failure
        if: (failure() || cancelled()) && github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ "$JOB_STATUS" = "cancelled" ]; then
            BODY="Run cancelled: https://github.com/$REPO/actions/runs/$RUN_ID (cc @$ACTOR)"
          else
            BODY="Run failed: https://github.com/$REPO/actions/runs/$RUN_ID (cc @$ACTOR)"
          fi
          gh api --method PATCH repos/$REPO/issues/comments/$REPORT_COMMENT_ID \
            -f body="$BODY"
