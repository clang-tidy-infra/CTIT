name: Nightly Crash Detection

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  crash-detection:
    runs-on: self-hosted
    container:
      image: ghcr.io/clang-tidy-infra/ctit-runner:latest # zizmor: ignore[unpinned-images]
      options: --user root
    timeout-minutes: 360
    permissions:
      contents: read
      issues: write
      packages: read

    env:
      SCCACHE_GHA_ENABLED: "true"
      LLVM_SYMBOLIZER_PATH: ${{ github.workspace }}/llvm-project/build/bin/llvm-symbolizer

    steps:
      - name: Checkout CTIT
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          fetch-depth: 1
          persist-credentials: false

      - name: Prepare LLVM submodule
        run: |
          git config --global --add safe.directory '*'
          git -C llvm-project checkout .
          git -C llvm-project clean -fdx

      - name: Restore test-projects cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: test_projects
          key: test-projects-${{ hashFiles('testers/projects.json') }}

      - name: Clone test projects
        run: ./ctit.py clone --work-dir test_projects

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Build clang-tidy
        run: bash build.sh

      - name: Configure test projects
        run: ./ctit.py configure

      - name: Run clang-tidy with all checks
        run: >
          ./ctit.py analyze
          --check-name "*,-clang-analyzer-*,-bugprone-unchecked-optional-access,-abseil-unchecked-statusor-access"
          --clang-tidy-binary llvm-project/build/bin/clang-tidy
          --run-tidy-script llvm-project/clang-tools-extra/clang-tidy/tool/run-clang-tidy.py
          --skip-headers
          --enable-check-profile

      - name: Detect crashes
        id: detect-crashes
        run: python3 crash_detection/detect_crashes.py --log-dir logs/ --summary-file crash-summary.md

      - name: Parse check timings profile
        run: python3 crash_detection/parse_check_profile.py --log-dir logs/ --output profile-report.md

      - name: Generate crash issue markdown
        if: steps.detect-crashes.outputs.crashes_found == 'true'
        env:
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python3 crash_detection/create_crash_issue.py \
            --repo "$REPO" \
            --run-id "$RUN_ID" \
            --summary-file crash-summary.md \
            --profile-file profile-report.md \
            --output-file logs/issue.md

      - name: Upload logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: crash-detection-logs
          path: |
            logs/
            profile-report-detailed.md

      - name: Create GitHub issue
        if: steps.detect-crashes.outputs.crashes_found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Nightly crash detection: crashes found $(date -u '+%Y-%m-%d %H:%M:%S')" \
            --body-file logs/issue.md
