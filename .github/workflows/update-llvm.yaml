name: Update LLVM

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  update-submodule:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          fetch-depth: 0
          persist-credentials: false

      - name: Update LLVM Submodule
        run: |
          git submodule update --remote llvm-project

      - name: Check for changes
        id: diff
        run: |
          if [[ -n $(git status -s) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected in submodule."
          else
            echo "No changes detected."
          fi

      - name: Commit and Push
        if: steps.diff.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git add llvm-project
          git commit -m "chore: update llvm-project submodule to latest"
          git push

  determine-runner:
    needs: update-submodule
    runs-on: ubuntu-latest
    permissions: {}
    timeout-minutes: 1
    outputs:
      runner: ${{ steps.set-runner.outputs.use-runner }}
    steps:
      - name: Determine runner
        id: set-runner
        uses: mikehardy/runner-fallback-action@dc7732f9e532c451b2527b288ba8d58fd4b0a4ca # v1.1.0
        with:
          primary-runner: "local-runner"
          fallback-runner: "self-hosted"
          github-token: ${{ secrets.RUNNER_ACCESS_TOKEN }}

  warmup:
    needs: determine-runner
    runs-on: ${{ fromJson(needs.determine-runner.outputs.runner) }}
    container:
      image: ghcr.io/clang-tidy-infra/ctit-runner:latest # zizmor: ignore[unpinned-images]
      options: --user root
    timeout-minutes: 360

    permissions:
      contents: read
      packages: read

    env:
      SCCACHE_GHA_ENABLED: "true"

    steps:
      - name: Checkout CTIT
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          fetch-depth: 1
          persist-credentials: false

      - name: Prepare LLVM submodule
        run: |
          git config --global --add safe.directory '*'
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C llvm-project checkout .
          git -C llvm-project clean -fdx

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Warmup clang-tidy
        run: bash build.sh
